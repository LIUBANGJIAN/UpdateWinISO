name: Windows10_LTSC2021_amd64_Auto
on:
  workflow_dispatch:
  schedule:
    - cron: '30 */6 * * *'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      FILE_NAME_PREFIX: Windows10_LTSC2021_amd64
      TARGET_TAG: Windows10_LTSC_2021_Builds
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set Time
        run: |
          $now = [System.DateTime]::UtcNow.AddHours(8)
          echo "BJ_TIME=$($now.ToString('yyyy-MM-dd HH:mm:ss'))" >> $env:GITHUB_ENV
          echo "BJ_DATE=$($now.ToString('yyyy-MM-dd'))" >> $env:GITHUB_ENV
      - name: Patching
        shell: pwsh
        run: |
          $script_dir = Join-Path (Get-Item ..).FullName "Win_ISO_Patching_Scripts"
          git clone --depth 1 https://github.com/adavak/Win_ISO_Patching_Scripts.git $script_dir
          Push-Location $script_dir
          curl.exe -L -o ltsc2021.7z.001 https://github.com/yuanpeirong/UpdateWinISO/releases/download/Windows10ISO/zh-cn_windows_10_enterprise_ltsc_2021_x64_dvd_033b7312.7z.001
          curl.exe -L -o ltsc2021.7z.002 https://github.com/yuanpeirong/UpdateWinISO/releases/download/Windows10ISO/zh-cn_windows_10_enterprise_ltsc_2021_x64_dvd_033b7312.7z.002
          curl.exe -L -o ltsc2021.7z.003 https://github.com/yuanpeirong/UpdateWinISO/releases/download/Windows10ISO/zh-cn_windows_10_enterprise_ltsc_2021_x64_dvd_033b7312.7z.003
          7z x ltsc2021.7z.001
          Copy-Item -Path (Join-Path $env:GITHUB_WORKSPACE "mycmd" "W10UI.cmd") -Destination (Join-Path $script_dir "W10UI.cmd") -Force
          ./Start.cmd
          Pop-Location
      - name: Pack
        shell: pwsh
        run: |
          $script_dir = Join-Path (Get-Item ..).FullName "Win_ISO_Patching_Scripts"
          $iso = Get-ChildItem -Path $script_dir -Filter "*.iso" | Select-Object -First 1
          if ($iso.Name -match '(\d+\.\d+)') { $v = $matches[1] } else { $v = "19044.latest" }
          echo "DETECTED_VER=$v" >> $env:GITHUB_ENV
          7z a -v1000M -mx=3 -mmt=on "${{env.FILE_NAME_PREFIX}}-$v.7z" "$($iso.FullName)"
      - name: ReleaseBody
        shell: pwsh
        run: |
          $repo = "${{ github.repository }}"; $tag = "${{ env.TARGET_TAG }}"
          $body = "### 🛠️ 构建信息`n- **北京时间**: ${{ env.BJ_TIME }}`n- **内核版本**: Build ${{ env.DETECTED_VER }}`n`n#### 🚀 极速下载 (gh-proxy)`n| 文件名 | 下载链接 |`n| :--- | :--- |`n"
          Get-ChildItem -Filter "${{env.FILE_NAME_PREFIX}}-${{env.DETECTED_VER}}.7z*" | ForEach-Object {
            $body += "| $($_.Name) | [点击下载](https://cdn.gh-proxy.org/https://github.com/$repo/releases/download/$tag/$($_.Name)) |`n"
          }
          $body | Out-File -FilePath release_body.txt -Encoding utf8
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TARGET_TAG }}
          name: "LTSC 2021 Build ${{ env.DETECTED_VER }} (${{ env.BJ_DATE }})"
          body_path: release_body.txt
          files: ${{env.FILE_NAME_PREFIX}}-${{env.DETECTED_VER}}.7z*
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
